name: Build All Platforms

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            cli_name: EUT-GPT-CLI-1.0.4-x64-Linux
            cli_ext: ""
            launcher_args: --linux AppImage --x64
          - os: ubuntu-latest
            arch: arm64
            cli_name: EUT-GPT-CLI-1.0.4-arm64-Linux
            cli_ext: ""
            launcher_args: --linux AppImage --arm64

          - os: windows-latest
            arch: x64
            cli_name: EUT-GPT-CLI-1.0.4-x64-Win
            cli_ext: .exe
            launcher_args: --win portable --x64
          - os: windows-latest
            arch: arm64
            cli_name: EUT-GPT-CLI-1.0.4-arm64-Win
            cli_ext: .exe
            launcher_args: --win portable --arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AppImage dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          CLI_NAME: ${{ matrix.cli_name }}
          LAUNCHER_ARGS: ${{ matrix.launcher_args }}
        run: build.bat

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        env:
          CLI_NAME: ${{ matrix.cli_name }}
          LAUNCHER_ARGS: ${{ matrix.launcher_args }}
        run: chmod +x build.sh && ./build.sh

      - name: Collect artifacts into builds/
        shell: bash
        run: |
          rm -rf builds
          mkdir -p builds
          cp "dist/${{ matrix.cli_name }}${{ matrix.cli_ext }}" "builds/${{ matrix.cli_name }}${{ matrix.cli_ext }}"
          cp dist/EUT-GPT-Launcher-* builds/
      
      - name: Upload builds (${{ runner.os }}-${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: eutgpt-builds-${{ runner.os }}-${{ matrix.arch }}
          path: builds/

  publish:
    needs: [build]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Download all platform builds
        uses: actions/download-artifact@v4
        with:
          pattern: eutgpt-builds-*
          merge-multiple: true
          path: builds/

      - name: Commit and push builds/ (via LFS)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git lfs install
          git lfs track "builds/**"
          git add builds/ .gitattributes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update builds [skip ci]"
            git push
          fi
