name: Build All Platforms

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        include:
          - os: ubuntu-latest
            cli_src: eutgpt-cli
            cli_out: eutgpt-cli-linux
            launcher_pat: EUT-GPT-Launcher-*.AppImage
          - os: macos-latest
            cli_src: eutgpt-cli
            cli_out: eutgpt-cli-macos
            launcher_pat: EUT-GPT-Launcher-*.dmg
          - os: windows-latest
            cli_src: eutgpt-cli.exe
            cli_out: eutgpt-cli-win.exe
            launcher_pat: EUT-GPT-Launcher-*.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AppImage dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: build.bat

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: chmod +x build.sh && ./build.sh

      - name: Collect artifacts into builds/
        run: |
          mkdir -p builds
          cp "dist/${{ matrix.cli_src }}" "builds/${{ matrix.cli_out }}"
          cp dist/${{ matrix.launcher_pat }} builds/

      - name: Upload all builds
        uses: actions/upload-artifact@v4
        with:
          name: eutgpt-builds
          path: builds/
