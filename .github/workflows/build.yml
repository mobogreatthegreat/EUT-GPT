name: Build All Platforms

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        include:
          - os: ubuntu-latest
            cli_src: eutgpt-cli
            cli_out: eutgpt-cli-linux
            launcher_pat: EUT-GPT-Launcher-*.AppImage
          - os: macos-latest
            cli_src: eutgpt-cli
            cli_out: eutgpt-cli-macos
            launcher_pat: EUT-GPT-Launcher-*.dmg
          - os: windows-latest
            cli_src: eutgpt-cli.exe
            cli_out: eutgpt-cli-win.exe
            launcher_pat: EUT-GPT-Launcher-*.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AppImage dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: build.bat

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: chmod +x build.sh && ./build.sh

      - name: Collect artifacts into builds/
        run: |
          mkdir -p builds
          cp "dist/${{ matrix.cli_src }}" "builds/${{ matrix.cli_out }}"
          cp dist/${{ matrix.launcher_pat }} builds/

      - name: Upload builds (${{ runner.os }})
        uses: actions/upload-artifact@v4
        with:
          name: eutgpt-builds-${{ runner.os }}
          path: builds/

  publish:
    needs: [build]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Download all platform builds
        uses: actions/download-artifact@v4
        with:
          pattern: eutgpt-builds-*
          merge-multiple: true
          path: builds/

      - name: Commit and push builds/ (via LFS)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git lfs install
          git lfs track "builds/**"
          git add builds/ .gitattributes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update builds [skip ci]"
            git push
          fi
